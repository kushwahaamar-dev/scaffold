name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    name: frontend + agents typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test
      - run: npm run build

  contracts:
    name: foundry build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install OZ + forge-std
        run: |
          cd contracts
          mkdir -p lib
          [ -d lib/openzeppelin-contracts ] || git clone --depth 1 -b v5.1.0 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          [ -d lib/forge-std ] || git clone --depth 1 -b v1.9.4 https://github.com/foundry-rs/forge-std.git lib/forge-std
      - name: Build
        run: cd contracts && forge build
      - name: Test
        run: cd contracts && forge test -vv
